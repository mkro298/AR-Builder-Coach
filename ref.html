<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Builder Coach Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(112, 169, 150, 0.5);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(112, 169, 150, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(112, 169, 150, 0);
      }
    }

    @keyframes scan-line {
      0% {
        top: 8%;
        opacity: 1;
      }

      100% {
        top: 92%;
        opacity: 0.3;
      }
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes label-pop {
      0% {
        opacity: 0;
        transform: scale(0.7);
      }

      70% {
        transform: scale(1.05);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes blink-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #70a996, #a8d8cb, #70a996, transparent);
      animation: scan-line 2s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 10;
    }

    .ar-label {
      animation: label-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .pulse-btn {
      animation: pulse-ring 2s ease infinite;
    }

    .fade-in-up {
      animation: fade-in-up 0.4s ease forwards;
    }

    .shimmer-bg {
      background: linear-gradient(90deg, #1e2229 25%, #2a3040 50%, #1e2229 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .blink {
      animation: blink-dot 1.2s ease infinite;
    }

    video {
      object-fit: cover;
    }
  </style>
</head>

<body class="bg-slate-900 m-0 p-0 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- SVG Icons ---
    const IconChevronLeft = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconHelpCircle = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconSearch = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconPlay = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconFlashlight = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z"></path><line x1="6" y1="6" x2="18" y2="6"></line><line x1="12" y1="12" x2="12" y2="12"></line></svg>;
    const IconGrid = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>;
    const IconAlertTriangle = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconX = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconRotateCcw = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
    const IconZoomIn = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;
    const IconBriefcase = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;
    const IconPause = ({ size = 24, color = "currentColor", fill = "none" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
    const IconCamera = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
    const IconRefreshCw = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
    const IconZap = ({ size = 24, color = "currentColor" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;

    const theme = {
      darkTeal: '#476e62',
      lightTeal: '#e8f3ef',
      coral: '#f09a80',
      darkBg: '#111418',
      coachBg: '#b08181',
    };

    // Label color palette for variety
    const LABEL_COLORS = [
      { bg: '#476e62', text: '#ffffff' },
      { bg: '#f09a80', text: '#ffffff' },
      { bg: '#3b6ea8', text: '#ffffff' },
      { bg: '#7c5cbf', text: '#ffffff' },
      { bg: '#c47a2a', text: '#ffffff' },
      { bg: '#2a7a6a', text: '#ffffff' },
    ];

    const API_BASE = window.API_BASE || 'http://localhost:8000/api';
    const DEFAULT_INVENTORY = ['breadboard', 'arduino nano', 'led', '220Ω resistor', 'jumper wire', 'usb cable'];
    const MATERIAL_MAP = [
      { keywords: ["arduino", "nano"], label: "arduino nano" },
      { keywords: ["breadboard"], label: "breadboard" },
      { keywords: ["led"], label: "led" },
      { keywords: ["220", "resistor"], label: "220Ω resistor" },
      { keywords: ["resistor"], label: "resistor" },
      { keywords: ["jumper", "wire"], label: "jumper wire" },
      { keywords: ["usb"], label: "usb cable" }
    ];

    function classifyMaterials(detectedParts) {
      return (detectedParts || []).map(item => {
        const text = String(item).toLowerCase();


        for (const rule of MATERIAL_MAP) {
          if (rule.keywords.every(k => text.includes(k))) {
            return rule.label;
          }
        }


        return "unknown";
      });
    }


    const AppContainer = ({ children, bg = '#f8fafc' }) => (
      <div className="flex justify-center items-center min-h-screen bg-[#171923] p-4 sm:p-8">
        <div
          className="relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-slate-900 no-scrollbar"
          style={{ width: '390px', height: '844px', backgroundColor: bg, maxHeight: '90vh' }}
        >
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-slate-900 rounded-b-3xl z-50"></div>
          <div className="h-full flex flex-col pt-10 pb-8 overflow-y-auto no-scrollbar">
            {children}
          </div>
        </div>
      </div>
    );

    // AR overlay renderer for backend-returned instructions
    const OverlayCanvas = ({ overlay, zoom = 1 }) => {
      if (!overlay) return null;

      const boxStyle = (bbox, color = '#4ade80') => ({
        left: `${(bbox.x - bbox.w / 2) * 100}%`,
        top: `${(bbox.y - bbox.h / 2) * 100}%`,
        width: `${bbox.w * 100 * zoom}%`,
        height: `${bbox.h * 100 * zoom}%`,
        borderColor: color,
      });

      return (
        <div className="absolute inset-0 pointer-events-none z-20">
          {overlay.highlight_box && (
            <div className="absolute border-2 border-dashed rounded-2xl shadow-[0_0_20px_rgba(74,222,128,0.45)]" style={boxStyle(overlay.highlight_box)} />
          )}

          {(overlay.detected_boxes || []).map((item, idx) => (
            <div key={idx} className="absolute border rounded-xl" style={boxStyle(item.bbox, '#f59e0b')}>
              <div className="absolute -top-5 left-0 text-[9px] px-2 py-0.5 rounded-full bg-amber-400 text-slate-900 font-semibold">{item.label}</div>
            </div>
          ))}

          {(overlay.hand_points || []).map((pt, idx) => (
            <div key={idx} className="absolute w-4 h-4 rounded-full bg-cyan-400/80 ring-4 ring-cyan-300/30" style={{ left: `calc(${pt.x * 100}% - 8px)`, top: `calc(${pt.y * 100}% - 8px)` }} />
          ))}

          {(overlay.arrows || []).map((arrow, idx) => {
            const left = `${arrow.x2 * 100}%`;
            const top = `${arrow.y2 * 100}%`;
            const height = `${Math.max(20, (arrow.y2 - arrow.y1) * 100 * 3)}%`;
            return (
              <div key={idx} className="absolute flex flex-col items-center" style={{ left, top: `calc(${arrow.y1 * 100}% - 8px)` }}>
                <div className="w-1 bg-orange-400 rounded-full" style={{ height }}></div>
                <div className="w-0 h-0 border-l-[8px] border-r-[8px] border-t-[12px] border-l-transparent border-r-transparent border-t-orange-400"></div>
              </div>
            );
          })}

          {overlay.hint && (
            <div className="absolute left-4 top-4 max-w-[78%] bg-[#1e2229]/80 text-white text-[11px] px-3 py-2 rounded-xl backdrop-blur-sm shadow-lg">
              {overlay.hint}
            </div>
          )}
        </div>
      );
    };

    // ─── Screen 1: Home ──────────────────────────────────────────────────────────
    const ScreenHome = ({ onScan }) => (
      <AppContainer bg="#ffffff">
        <div className="px-6 pt-8 flex-1 flex flex-col">
          <h1 className="text-[28px] font-semibold text-slate-800 leading-tight">AR Builder Coach</h1>
          <p className="text-sm text-slate-500 mt-2 leading-relaxed">
            Scan what you have. Find what you can build. Get guided step by step.
          </p>

          <div className="mt-8 mb-8 relative h-64 border border-slate-100 bg-[#fbfdfc] rounded-3xl overflow-hidden flex items-center justify-center">
            <div className="relative w-40 h-48 border-2 border-slate-200 rounded-2xl bg-white shadow-sm flex flex-col justify-center items-center">
              <div className="grid grid-cols-4 gap-2 opacity-20 mt-4">
                {[...Array(16)].map((_, i) => <div key={i} className="w-1.5 h-1.5 rounded-full bg-slate-800"></div>)}
              </div>
              <div className="absolute -inset-4 border border-slate-200 rounded-3xl bg-white/40 shadow-xl backdrop-blur-[1px]"></div>
              <div className="absolute top-4 -right-8 bg-[#476e62] text-white text-[9px] px-2 py-1 rounded-full shadow-sm">Arduino Nano</div>
              <div className="absolute top-1/3 -left-10 bg-[#f09a80] text-white text-[9px] px-2 py-1 rounded-full shadow-sm">Breadboard</div>
              <div className="absolute bottom-6 right-2 bg-[#64c084] text-white text-[9px] px-2 py-1 rounded-full shadow-sm">LED x5</div>
            </div>
          </div>

          <div className="mt-auto space-y-3">
            <button onClick={onScan} className="w-full py-4 rounded-xl text-white font-medium flex items-center justify-center gap-2 pulse-btn" style={{ backgroundColor: theme.darkTeal }}>
              <IconCamera size={18} color="white" />
              Scan Materials
            </button>
            <button className="w-full py-4 rounded-xl font-medium" style={{ backgroundColor: theme.lightTeal, color: theme.darkTeal }}>
              Build from Drafts
            </button>
            <div className="flex gap-3 pt-2">
              <button className="flex-1 py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-slate-700">
                <IconSearch size={16} /> Plan
              </button>
              <button className="flex-1 py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-slate-700">
                <IconPlay size={16} /> Tutorial
              </button>
            </div>
          </div>
        </div>
      </AppContainer>
    );

    // ─── Screen 2: Live Camera Scanning ─────────────────────────────────────────
    const ScreenScanning = ({ onBack, onConfirm }) => {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const streamRef = useRef(null);
      const intervalRef = useRef(null);

      const [status, setStatus] = useState('starting'); // starting | scanning | detected | error
      const [labels, setLabels] = useState([]);
      const [scanCount, setScanCount] = useState(0);
      const [cameraError, setCameraError] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [confirmedParts, setConfirmedParts] = useState([]);
      const [manualInput, setManualInput] = useState(''); // attributed to ChatGPT

      // Capture a frame from the video as base64
      const captureFrame = useCallback(() => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        if (!video || !canvas || video.readyState < 2) return null;

        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, 640, 480);
        // Return base64 without the data URL prefix
        return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
      }, []);

      // Call Claude API to detect components
      const analyzeFrame = useCallback(async () => {
        if (isAnalyzing) return;
        const frameData = captureFrame();
        if (!frameData) return;

        setIsAnalyzing(true);
        setStatus('scanning');

        try {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': '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',
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 1000,
              messages: [{
                role: 'user',
                content: [
                  {
                    type: 'image',
                    source: { type: 'base64', media_type: 'image/jpeg', data: frameData }
                  },
                  {
                    type: 'text',
                    text: `You are an AR object detector. Identify and label every distinct object visible in this image.
 
Respond with ONLY a JSON array (no markdown, no explanation) like this:
[
  {"label": "Coffee Mug", "x": 45, "y": 30, "confidence": "high"},
  {"label": "Laptop", "x": 20, "y": 60, "confidence": "high"}
]
 
Where x and y are percentage positions (0-85) of where to place the AR label on screen.
Spread labels out so they don't overlap — vary x between 5-75 and y between 10-80.
Place each label near the actual object it refers to.
 
Detect everything: people, furniture, food, electronics, plants, animals, clothing, tools, vehicles, text/signs, or any other object. Be specific with names (e.g. "MacBook Pro" not just "laptop", "Coffee Mug" not just "cup").
The only things you should ignore are background elements (for example: walls, people, tables, and chairs).
 
If the image is blank or nothing is identifiable, return an empty array: []
 
Return ONLY the JSON array, nothing else.`
                  }
                ]
              }]
            })
          });

          const data = await response.json();
          console.log(data);
          const text = data.content?.[0]?.text || '[]';

          // Clean and parse JSON
          const clean = text.replace(/```json|```/g, '').trim();
          const parsed = JSON.parse(clean);

          if (Array.isArray(parsed) && parsed.length > 0) {
            // Assign colors and keys
            const withColors = parsed.map((item, i) => ({
              ...item,
              color: LABEL_COLORS[i % LABEL_COLORS.length],
              id: `${item.label}-${Date.now()}-${i}`
            }));
            setLabels(withColors);
            setConfirmedParts(parsed.map(p => p.label));
            setStatus('detected');
            setScanCount(c => c + 1);
          } else {
            setLabels([]);
            setStatus('scanning');
          }
        } catch (err) {
          console.error('Analysis error:', err);
          // Don't show error state for transient failures, just keep scanning
        } finally {
          setIsAnalyzing(false);
        }
      }, [isAnalyzing, captureFrame]);

      // Start camera
      useEffect(() => {
        let mounted = true;

        const startCamera = async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.play();
            }
            setStatus('scanning');
          } catch (err) {
            if (!mounted) return;
            console.error('Camera error:', err);
            setCameraError(err.name === 'NotAllowedError'
              ? 'Camera permission denied. Please allow camera access and try again.'
              : 'Could not access camera. Please check your device.');
            setStatus('error');
          }
        };

        startCamera();
        return () => {
          mounted = false;
          if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
          if (intervalRef.current) clearInterval(intervalRef.current);
        };
      }, []);

      // Auto-scan every 4 seconds once camera is ready
      useEffect(() => {
        if (status === 'error' || status === 'starting') return;
        intervalRef.current = setInterval(analyzeFrame, 4000);
        // Kick off first scan after 1.5s
        const firstScan = setTimeout(analyzeFrame, 1500);
        return () => {
          clearInterval(intervalRef.current);
          clearTimeout(firstScan);
        };
      }, [status === 'scanning' || status === 'detected']);

      const handleRescan = () => {
        setLabels([]);
        setStatus('scanning');
        analyzeFrame();
      };

      const parseManualInput = (text) => {
        return text
          .split(',')
          .map(x => x.trim())
          .filter(Boolean);
      };

      const handleConfirm = () => {
        if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
        onConfirm(confirmedParts);
      };

      return (
        <AppContainer bg={theme.darkBg}>
          <div className="flex-1 flex flex-col text-white relative">
            {/* Header */}
            <div className="flex items-center justify-between px-4 py-2 z-20 relative">
              <button onClick={() => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); onBack(); }} className="p-2 text-white">
                <IconChevronLeft size={24} />
              </button>
              <div className="flex items-center gap-2">
                {status === 'scanning' && <div className="w-2 h-2 rounded-full bg-yellow-400 blink"></div>}
                {status === 'detected' && <div className="w-2 h-2 rounded-full bg-green-400 blink"></div>}
                <span className="font-semibold text-sm">
                  {status === 'starting' && 'Starting camera...'}
                  {status === 'scanning' && (isAnalyzing ? 'Analyzing...' : 'Scanning...')}
                  {status === 'detected' && `${labels.length} part${labels.length !== 1 ? 's' : ''} detected`}
                  {status === 'error' && 'Camera Error'}
                </span>
              </div>
              <button className="p-2 text-slate-400"><IconHelpCircle size={20} /></button>
            </div>

            {/* Camera Viewfinder */}
            <div className="flex-1 relative mx-4 mt-2 rounded-3xl overflow-hidden bg-[#1e2229]">
              {/* Live video */}
              <video
                ref={videoRef}
                autoPlay
                playsInline
                muted
                className="absolute inset-0 w-full h-full object-cover rounded-3xl"
                style={{ display: status === 'error' ? 'none' : 'block' }}
              />

              {/* Hidden canvas for frame capture */}
              <canvas ref={canvasRef} className="hidden" />

              {/* Scan line animation */}
              {(status === 'scanning' || status === 'detected') && (
                <div className="scan-line" />
              )}

              {/* Corner guides */}
              <div className="absolute top-4 left-4 w-8 h-8 border-t-2 border-l-2 border-[#70a996] rounded-tl-sm z-10 pointer-events-none"></div>
              <div className="absolute top-4 right-4 w-8 h-8 border-t-2 border-r-2 border-[#70a996] rounded-tr-sm z-10 pointer-events-none"></div>
              <div className="absolute bottom-4 left-4 w-8 h-8 border-b-2 border-l-2 border-[#70a996] rounded-bl-sm z-10 pointer-events-none"></div>

                  <div className="w-2 h-2 rounded-full border-2 border-white shadow-lg shrink-0"

                  <div className="flex items-center gap-1 px-2.5 py-1 rounded-full shadow-lg text-[10px] font-bold whitespace-nowrap"

              {/* Scan hint when no parts yet */}
              {status === 'scanning' && !isAnalyzing && labels.length === 0 && (
                <div className="absolute bottom-6 left-0 right-0 flex justify-center z-10">
                  <div className="bg-black/50 backdrop-blur-sm px-4 py-2 rounded-full">
                    <p className="text-slate-300 text-[11px] text-center">Point camera at electronics components</p>
                  </div>
                </div>

            {/* Parts tray — appears when parts are detected */}
            {labels.length > 0 && (
              <div className="mx-4 mt-3 bg-[#1a1f27] rounded-2xl p-3 fade-in-up">
                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Detected Parts</p>
                <div className="flex flex-wrap gap-1.5">
                  {labels.map((item, i) => (
                    <span key={i} className="px-2 py-0.5 rounded-full text-[10px] font-semibold"
                      style={{ backgroundColor: item.color.bg + '30', color: item.color.bg === '#ffffff' ? '#aaa' : item.color.bg, border: `1px solid ${item.color.bg}50` }}>
                      {item.label}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* Bottom Controls */}
            <div className="px-5 mt-3 flex items-center justify-between">
              <button className="w-11 h-11 bg-[#1e2229] rounded-full flex items-center justify-center text-slate-300 hover:bg-[#2a2d35] transition-colors">
                <IconFlashlight size={18} />
              </button>
              <button onClick={handleRescan} className="px-6 py-2.5 bg-[#2a2d35] rounded-full text-sm font-medium flex items-center gap-2 hover:bg-[#343840] transition-colors">
                <IconRefreshCw size={14} />
                Re-scan
              </button>
              <button className="w-11 h-11 bg-[#1e2229] rounded-full flex items-center justify-center text-slate-300 hover:bg-[#2a2d35] transition-colors">
                <IconGrid size={18} />
              </button>
            </div>

            <div className="px-5 mt-3 mb-2">
              <div className="mb-3">
                <input
                  type="text"
                  placeholder="Type materials separated by commas"
                  value={manualInput}
                  onChange={(e) => setManualInput(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl bg-white text-slate-800 text-sm border border-slate-200 outline-none"
                />
                <button
                  onClick={() => {
                    const parsed = parseManualInput(manualInput);
                    setConfirmedParts(parsed);
                    setLabels([]);
                    setStatus(parsed.length > 0 ? 'detected' : 'scanning');
                  }}
                  className="w-full mt-2 py-3 rounded-xl font-medium bg-slate-200 text-slate-700"
                >
                  Use Typed List

              <button
                onClick={handleConfirm}
                disabled={confirmedParts.length === 0}

                style={{ backgroundColor: confirmedParts.length > 0 ? theme.coral : '#888' }}
              >
                {confirmedParts.length > 0
                  ? `Confirm ${confirmedParts.length} Part${confirmedParts.length !== 1 ? 's' : ''}`
                  : 'Scanning for parts...'}

            </div>
          </div>
        </AppContainer>
      );
    };

    // ─── Screen 3 & Screen 4: Feasible Plans + Corresponding Steps ────────────────────────────────────────────────
    // [ADDED for screen4 backend integration] screen3 now fetches dynamic feasible plans from backend,
    // instead of staying fully hard-coded.
    const ScreenPlans = ({ onBack, onStart, detectedParts, plans, plansLoading, onRefreshPlans }) => (
      <AppContainer bg="#ffffff">
        <div className="flex-1 flex flex-col">
          <div className="flex items-center justify-between px-4 py-2">
            <button onClick={onBack} className="p-2 text-slate-800"><IconChevronLeft size={24} /></button>
            <span className="font-semibold text-sm text-slate-800">Feasible Plans</span>
            <button className="p-2 text-slate-400"><IconHelpCircle size={20} /></button>
          </div>

          <div className="px-6 mt-4">
            {detectedParts.length > 0 && (
              <div className="mb-4 p-3 bg-[#e8f3ef] rounded-xl">
                <p className="text-[10px] font-bold text-[#476e62] uppercase tracking-wider mb-1.5">Scanned Materials</p>
                <div className="flex flex-wrap gap-1.5">
                  {detectedParts.map((p, i) => (
                    <span key={i} className="px-2 py-0.5 bg-white text-[#476e62] text-[10px] rounded-full font-medium border border-[#c5e0d8]">{p}</span>
                  ))}

              </div>
            )}

            <div className="flex items-center justify-between mb-4">
              <p className="text-sm text-slate-600">Based on your scanned materials and settings.</p>
              <button onClick={onRefreshPlans} className="text-[11px] px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 hover:bg-slate-50">Refresh</button>
            </div>

            {plansLoading && <p className="text-sm text-slate-500 mb-3">Loading feasible plans...</p>}

            <div className="space-y-4">
              {plans.map((plan) => (
                <div
                  key={plan.id}
                  className={`p-4 rounded-2xl transition-colors ${plan.available ? 'border border-teal-100 bg-white shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] cursor-pointer hover:border-teal-300' : 'bg-[#f8fafc] border border-slate-100 opacity-75'}`}
                  onClick={() => plan.available && onStart(plan)}
                >
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <span className={`px-2 py-0.5 text-[9px] font-bold rounded-sm uppercase tracking-wider ${plan.available ? 'bg-[#e4f6ef] text-[#476e62]' : 'bg-slate-200 text-slate-400'}`}>{plan.badge}</span>
                      <h3 className={`font-semibold mt-1 ${plan.available ? 'text-slate-800' : 'text-slate-400'}`}>{plan.name}</h3>
                    </div>
                    <span className={`font-semibold text-sm ${plan.available ? 'text-[#476e62]' : 'text-slate-400'}`}>{plan.time_estimate}</span>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed mt-1">{plan.description}</p>
                  {!plan.available && plan.missing_parts?.length > 0 && (
                    <div className="flex items-center gap-1.5 mt-2">
                      <IconAlertTriangle size={12} color="#d9a08e" />
                      <p className="text-[11px] font-medium text-[#d9a08e]">Missing required part: {plan.missing_parts.join(', ')}</p>
                    </div>
                  )}

              ))}
            </div>
          </div>

          <div className="mt-auto px-6 mb-8">
            <button
              onClick={() => plans.find(p => p.available) && onStart(plans.find(p => p.available))}
              className="w-full py-4 rounded-xl text-white font-medium shadow-md disabled:opacity-50"
              style={{ backgroundColor: theme.darkTeal }}
              disabled={!plans.some(p => p.available)}
            >
              {plans.some(p => p.available) ? `Start ${plans.find(p => p.available).name}` : 'No available plan'}
            </button>
          </div>
        </div>
      </AppContainer>
    );

    // [ADDED for screen4 backend integration] dynamic screen4 using backend session state,
    // while keeping the original layout and buttons as much as possible.
    const ScreenTracking = ({ onBack, sessionData, analysis, refImage, onRepeat, onZoom, onRefWiring, onNext, onTogglePause, onAnalyzeNow }) => {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const streamRef = useRef(null);
      const intervalRef = useRef(null);
      const [cameraReady, setCameraReady] = useState(false);

      const step = sessionData?.step;
      const currentIndex = sessionData?.current_step_index || 0;
      const progressLabels = sessionData?.progress_labels || [];

      const captureFrame = useCallback(() => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        if (!video || !canvas || video.videoWidth === 0) return null;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return {
          image_base64: canvas.toDataURL('image/jpeg', 0.75),
          image_width: canvas.width,
          image_height: canvas.height,
        };
      }, []);

      useEffect(() => {
        let mounted = true;
        const startCamera = async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
              audio: false,
            });
            if (!mounted) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              await videoRef.current.play();
            }
            setCameraReady(true);
          } catch (err) {
            console.error('Tracking camera error:', err);
          }
        };

        startCamera();
        return () => {
          mounted = false;
          if (intervalRef.current) clearInterval(intervalRef.current);
          if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
        };
      }, []);

      useEffect(() => {
        if (!cameraReady || !sessionData?.session_id) return;
        if (intervalRef.current) clearInterval(intervalRef.current);
        intervalRef.current = setInterval(() => {
          const frame = captureFrame();
          if (frame && !sessionData?.paused) {
            onAnalyzeNow(frame);
          }
        }, 1800);
        return () => {
          if (intervalRef.current) clearInterval(intervalRef.current);
        };
      }, [cameraReady, sessionData?.session_id, sessionData?.paused, captureFrame, onAnalyzeNow]);

      return (
        <AppContainer bg={theme.coachBg}>
          <div className="flex-1 flex flex-col relative h-full">
            <div className="px-4 py-3 bg-[#1e2229]/80 backdrop-blur-md rounded-xl mx-2 mt-2">
              <div className="flex items-center gap-2 mb-3">
                <div className={`w-1.5 h-1.5 rounded-full ${sessionData?.paused ? 'bg-yellow-400' : 'bg-[#4ade80]'} blink`}></div>
                <span className="text-[10px] font-bold text-white tracking-widest">{sessionData?.paused ? 'TRACKING PAUSED' : 'TRACKING ON'}</span>
              </div>

              <div className="flex gap-1 mb-1">
                {progressLabels.map((_, idx) => (
                  <div key={idx} className={`h-1 flex-1 rounded-full ${idx <= currentIndex ? 'bg-[#70a996]' : 'bg-slate-600'}`}></div>
                ))}
              </div>
              <div className="grid gap-1 text-[7px] text-slate-300 font-semibold uppercase" style={{ gridTemplateColumns: `repeat(${Math.max(progressLabels.length, 1)}, minmax(0, 1fr))` }}>
                {progressLabels.map((label, idx) => <span key={label + idx} className="truncate">{label}</span>)}
              </div>
            </div>

            <div className="relative mx-2 mt-3 rounded-3xl overflow-hidden border border-white/10 bg-[#1e2229] min-h-[360px] flex-1">
              <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover" />
              <canvas ref={canvasRef} className="hidden" />
              {!cameraReady && <div className="absolute inset-0 bg-[#111418]/80 flex items-center justify-center text-white text-sm z-10">Requesting camera access...</div>}
              <OverlayCanvas overlay={analysis?.overlay} zoom={sessionData?.zoom || 1} />

              <div className="absolute left-4 right-4 bottom-4 bg-[#111418]/70 backdrop-blur-md rounded-2xl px-4 py-3 text-white shadow-xl z-30">
                <div className="flex items-center justify-between gap-3">
                  <div>
                    <div className="text-[11px] uppercase tracking-wider text-emerald-300">Live detection</div>
                    <div className="text-sm font-semibold">{analysis?.feedback || 'Waiting for frame analysis...'}</div>
                  </div>
                  <div className={`text-xs px-3 py-1 rounded-full font-semibold ${analysis?.matched ? 'bg-emerald-400 text-slate-900' : 'bg-white/10 text-white'}`}>
                    {analysis?.matched ? 'Matched' : `${Math.round((analysis?.confidence || 0) * 100)}%`}
                  </div>
                </div>
              </div>
            </div>

            <div className="mt-auto bg-[#fafafa] rounded-t-3xl rounded-b-[32px] p-5 shadow-2xl pb-8 mx-2 mb-2 relative">
              <button onClick={onBack} className="absolute top-4 right-4 text-red-500 hover:bg-red-50 p-1 rounded-full transition-colors">
                <IconX size={18} />
              </button>
              <div className="flex justify-between items-start mt-2">
                <div className="flex-1 pr-4">
                  <span className="text-[9px] font-bold text-[#476e62] tracking-wider uppercase">Step {currentIndex + 1} of {sessionData?.total_steps || 0}</span>
                  <h2 className="text-[20px] font-bold text-slate-900 leading-tight mt-1 mb-1">{step?.title || 'Loading step...'}</h2>
                  <p className="text-[13px] text-slate-500 italic">{step?.subtitle || 'Preparing instructions...'}</p>
                </div>
                <div className="w-16 h-16 bg-white border border-slate-200 rounded-xl shadow-sm flex items-center justify-center text-3xl shrink-0">{step?.icon || '🛠️'}</div>
              </div>

              <div className="grid grid-cols-2 gap-3 mt-4 text-[11px] text-slate-600">
                <div className="rounded-xl bg-slate-50 px-3 py-2">Scene match: <span className="font-semibold text-slate-800">{Math.round((analysis?.scene_match_score || 0) * 100)}%</span></div>
                <div className="rounded-xl bg-slate-50 px-3 py-2">Hands detected: <span className="font-semibold text-slate-800">{analysis?.hands_detected || 0}</span></div>
              </div>

              {refImage && (
                <div className="mt-4 border border-slate-200 rounded-2xl overflow-hidden bg-white">
                  <img src={refImage} alt="Reference wiring" className="w-full h-36 object-cover" />
                </div>
              )}

              <div className="grid grid-cols-3 gap-3 mt-6 mb-6">
                <button onClick={onRepeat} className="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors">
                  <IconRotateCcw size={18} /><span className="text-[9px] font-medium mt-1.5">Repeat</span>
                </button>
                <button onClick={onZoom} className="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors">
                  <IconZoomIn size={18} /><span className="text-[9px] font-medium mt-1.5">Zoom</span>
                </button>
                <button onClick={onRefWiring} className="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors">
                  <IconBriefcase size={18} /><span className="text-[9px] font-medium mt-1.5">Ref Wiring</span>
                </button>
              </div>
              <div className="flex gap-3">
                <button onClick={onNext} className="flex-1 py-4 bg-[#111418] text-white rounded-2xl font-medium text-sm hover:bg-slate-800 transition-colors shadow-lg">Next</button>
                <button onClick={onTogglePause} className="px-5 bg-white border border-slate-200 text-slate-800 rounded-2xl shadow-sm flex items-center justify-center hover:bg-slate-50 transition-colors">
                  <IconPause size={18} fill="currentColor" />
                </button>
              </div>
            </div>
          </div>
        </AppContainer>
      );
    };

    // ─── Root App ─────────────────────────────────────────────────────────────────
    function ARBuilderCoach() {
      const [screen, setScreen] = useState(1);
      const [detectedParts, setDetectedParts] = useState([]);

      // [ADDED for screen4 backend integration] app-level state
      const [plans, setPlans] = useState([]);
      const [plansLoading, setPlansLoading] = useState(false);
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [sessionData, setSessionData] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      const [refImage, setRefImage] = useState(null);
      const [error, setError] = useState('');
      const [toast, setToast] = useState('');

      const api = useCallback(async (path, options = {}) => {
        const res = await fetch(`${API_BASE}${path}`, {
          headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
          ...options,
        });
        if (!res.ok) {
          let detail = 'Request failed';
          try {
            const data = await res.json();
            detail = data.detail || detail;
          } catch (e) { }
          throw new Error(detail);
        }
        return res.json();
      }, []);

      const fetchPlans = useCallback(async (parts = detectedParts) => {
        setPlansLoading(true);
        setError('');
        try {
          const rawParts = (parts && parts.length > 0) ? parts : DEFAULT_INVENTORY;
          const normalizedParts = classifyMaterials(rawParts);
          const data = await api('/plans', {
            method: 'POST',
            body: JSON.stringify({ materials: normalizedParts, preferences: { mode: 'prototype' } })
          });
          setPlans(data.plans || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setPlansLoading(false);
        }
      }, [api, detectedParts]);

      const startPlan = useCallback(async (plan) => {
        setError('');
        setRefImage(null);
        try {
          const rawParts = (detectedParts && detectedParts.length > 0) ? detectedParts : DEFAULT_INVENTORY;
          const normalizedParts = classifyMaterials(rawParts);
          const session = await api('/session/start', {
            method: 'POST',
            body: JSON.stringify({
              plan_id: plan.id,
              plan_name: plan.name,
              inventory: normalizedParts,
              preferences: { ar_mode: 'medium_prototype', source: 'screen3' }
            })
          });
          setSelectedPlan(plan);
          setSessionData(session);
          setAnalysis(session.last_analysis || null);
          setScreen(4);
        } catch (err) {
          setError(err.message);
        }
      }, [api, detectedParts]);

      const nextStep = useCallback(async () => {
        if (!sessionData?.session_id) return;
        try {
          const data = await api(`/session/${sessionData.session_id}/step/next`, { method: 'POST', body: JSON.stringify({}) });
          setSessionData(data);
          setAnalysis(null);
          setRefImage(null);
        } catch (err) {
          setError(err.message);
        }
      }, [api, sessionData]);

      const repeatStep = useCallback(async () => {
        if (!sessionData?.session_id) return;
        try {
          const data = await api(`/session/${sessionData.session_id}/step/repeat`, { method: 'POST', body: JSON.stringify({ replay_seconds: 5 }) });
          setSessionData(data);
          setToast('Replaying current guidance');
        } catch (err) {
          setError(err.message);
        }
      }, [api, sessionData]);

      const zoomStep = useCallback(async () => {
        if (!sessionData?.session_id) return;
        try {
          const data = await api(`/session/${sessionData.session_id}/step/zoom`, { method: 'POST', body: JSON.stringify({ delta: 0.2 }) });
          setSessionData(data);
        } catch (err) {
          setError(err.message);
        }
      }, [api, sessionData]);

      const togglePause = useCallback(async () => {
        if (!sessionData?.session_id) return;
        try {
          const data = await api(`/session/${sessionData.session_id}/step/toggle-pause`, {
            method: 'POST',
            body: JSON.stringify({ paused: !sessionData.paused })
          });
          setSessionData(data);
          setToast(data.paused ? 'Paused' : 'Resumed');
        } catch (err) {
          setError(err.message);
        }
      }, [api, sessionData]);

      const fetchRefWiring = useCallback(async () => {
        if (!sessionData?.session_id) return;
        try {
          const data = await api(`/session/${sessionData.session_id}/ref-wiring`, {
            method: 'POST',
            body: JSON.stringify({ session_id: sessionData.session_id })
          });
          setRefImage(data.image_url);
          setToast(data.source === 'openai' ? 'AI reference generated' : 'Fallback reference generated');
        } catch (err) {
          setError(err.message);
        }
      }, [api, sessionData]);

      const analyzeCurrentFrame = useCallback(async (frame) => {
        if (!sessionData?.session_id) return;
        try {
          const result = await api('/frame/analyze', {
            method: 'POST',
            body: JSON.stringify({
              session_id: sessionData.session_id,
              image_base64: frame.image_base64,
              image_width: frame.image_width,
              image_height: frame.image_height,
            })
          });
          setAnalysis(result);
        } catch (err) {
          setError(err.message);
        }
      }, [api, sessionData]);

      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(''), 2000);
        return () => clearTimeout(t);
      }, [toast]);

      useEffect(() => {
        if (screen === 3) {
          fetchPlans();
        }
      }, [screen, fetchPlans]);

      return (
        <>
          {(() => {
            switch (screen) {
              case 1:
                return <ScreenHome onScan={() => setScreen(2)} />;
              case 2:
                return <ScreenScanning onBack={() => setScreen(1)} onConfirm={(parts) => { setDetectedParts(parts); setScreen(3); }} />;
              case 3:
                return <ScreenPlans onBack={() => setScreen(2)} onStart={startPlan} detectedParts={detectedParts} plans={plans} plansLoading={plansLoading} onRefreshPlans={() => fetchPlans()} />;
              case 4:
                return <ScreenTracking onBack={() => setScreen(3)} sessionData={sessionData} analysis={analysis} refImage={refImage} onRepeat={repeatStep} onZoom={zoomStep} onRefWiring={fetchRefWiring} onNext={nextStep} onTogglePause={togglePause} onAnalyzeNow={analyzeCurrentFrame} />;
              default:
                return <ScreenHome onScan={() => setScreen(2)} />;
            }
          })()}

          {error && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[99] bg-red-500 text-white text-sm px-4 py-2 rounded-full shadow-lg">{error}</div>}
          {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[99] bg-slate-900 text-white text-sm px-4 py-2 rounded-full shadow-lg">{toast}</div>}
        </>
      );
    }
