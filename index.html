<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Builder Coach Prototype</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Hide scrollbars for the phone container to look more native */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-900 m-0 p-0 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- SVG Icons (Replacing Lucide dependencies for self-contained file) ---
    const IconChevronLeft = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconHelpCircle = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconSearch = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconPlay = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconFlashlight = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6c0 2-2 2-2 4v10a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V10c0-2-2-2-2-4V2h12z"></path><line x1="6" y1="6" x2="18" y2="6"></line><line x1="12" y1="12" x2="12" y2="12"></line></svg>;
    const IconGrid = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>;
    const IconAlertTriangle = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconX = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconRotateCcw = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
    const IconZoomIn = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;
    const IconBriefcase = ({size=24, color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;
    const IconPause = ({size=24, color="currentColor", fill="none"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;

    
    function ARBuilderCoach() {
      const [currentScreen, setCurrentScreen] = useState(1);

    
      const theme = {
        darkTeal: '#476e62',
        lightTeal: '#e8f3ef',
        coral: '#f09a80',
        darkBg: '#111418',
        coachBg: '#b08181',
      };

      // Generic App Wrapper simulating a mobile screen
      const AppContainer = ({ children, bg = '#f8fafc' }) => (
        <div className="flex justify-center items-center min-h-screen bg-[#171923] p-4 sm:p-8">
          <div 
            className="relative overflow-hidden shadow-2xl rounded-[40px] border-[8px] border-slate-900 no-scrollbar"
            style={{ width: '390px', height: '844px', backgroundColor: bg, maxHeight: '90vh' }}
          >
            {/* Safe Area Notch Mockup */}
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-slate-900 rounded-b-3xl z-50"></div>
            <div className="h-full flex flex-col pt-10 pb-8 overflow-y-auto no-scrollbar">
              {children}
            </div>
          </div>
        </div>
      );

      // Screen 1: Home
      const ScreenHome = () => (
        <AppContainer bg="#ffffff">
          <div className="px-6 pt-8 flex-1 flex flex-col">
            <h1 className="text-[28px] font-semibold text-slate-800 leading-tight">AR Builder Coach</h1>
            <p className="text-sm text-slate-500 mt-2 leading-relaxed">
              Scan what you have. Find what you can build. Get guided step by step.
            </p>

            {/* Hero Illustration Graphic */}
            <div className="mt-8 mb-8 relative h-64 border border-slate-100 bg-[#fbfdfc] rounded-3xl overflow-hidden flex items-center justify-center">
              <div className="relative w-40 h-48 border-2 border-slate-200 rounded-2xl bg-white shadow-sm flex flex-col justify-center items-center">
                 {/* Mock Breadboard Dots */}
                 <div className="grid grid-cols-4 gap-2 opacity-20 mt-4">
                    {[...Array(16)].map((_, i) => <div key={i} className="w-1.5 h-1.5 rounded-full bg-slate-800"></div>)}
                 </div>
                 {/* Scanning frame overlap */}
                 <div className="absolute -inset-4 border border-slate-200 rounded-3xl bg-white/40 shadow-xl backdrop-blur-[1px]"></div>
                 
                 {/* AR Labels */}
                 <div className="absolute top-4 -right-8 bg-[#476e62] text-white text-[9px] px-2 py-1 rounded-full shadow-sm">Arduino Nano</div>
                 <div className="absolute top-1/3 -left-10 bg-[#f09a80] text-white text-[9px] px-2 py-1 rounded-full shadow-sm">Breadboard</div>
                 <div className="absolute bottom-6 right-2 bg-[#64c084] text-white text-[9px] px-2 py-1 rounded-full shadow-sm">LED x5</div>
              </div>
            </div>

            {/* Action Buttons */}
            <div className="mt-auto space-y-3">
              <button onClick={() => setCurrentScreen(2)} className="w-full py-4 rounded-xl text-white font-medium" style={{ backgroundColor: theme.darkTeal }}>
                Scan Materials
              </button>
              <button className="w-full py-4 rounded-xl font-medium" style={{ backgroundColor: theme.lightTeal, color: theme.darkTeal }}>
                Build from Drafts
              </button>
              
              <div className="flex gap-3 pt-2">
                <button className="flex-1 py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-slate-700">
                  <IconSearch size={16} /> Plan
                </button>
                <button className="flex-1 py-3 border border-slate-200 rounded-xl flex items-center justify-center gap-2 text-sm font-medium text-slate-700">
                  <IconPlay size={16} /> Tutorial
                </button>
              </div>
            </div>
          </div>
        </AppContainer>
      );

      // Screen 2: Scanning
      const ScreenScanning = () => (
        <AppContainer bg={theme.darkBg}>
          <div className="flex-1 flex flex-col text-white">
            {/* Header */}
            <div className="flex items-center justify-between px-4 py-2">
              <button onClick={() => setCurrentScreen(1)} className="p-2 text-white"><IconChevronLeft size={24} /></button>
              <span className="font-semibold text-sm">Scanning...</span>
              <button className="p-2 text-slate-400"><IconHelpCircle size={20} /></button>
            </div>

            {/* Segmented Control */}
            <div className="px-5 mt-4">
              <div className="bg-[#2a2d35] p-1 rounded-xl flex text-xs font-medium">
                <button className="flex-1 py-2 rounded-lg text-slate-400">Scanned</button>
                <button className="flex-1 py-2 text-slate-400">Detected</button>
                <button className="flex-1 py-2 text-slate-400">Confirmed</button>
              </div>
            </div>

            {/* Viewfinder */}
            <div className="flex-1 relative m-5 mt-6 rounded-3xl bg-[#1e2229] border border-slate-700/50">
              {/* Corner Guides */}
              <div className="absolute top-6 left-6 w-8 h-8 border-t border-l border-slate-500"></div>
              <div className="absolute top-6 right-6 w-8 h-8 border-t border-r border-slate-500"></div>
              <div className="absolute bottom-6 left-6 w-8 h-8 border-b border-l border-slate-500"></div>
              <div className="absolute bottom-6 right-6 w-8 h-8 border-b border-r border-slate-500"></div>

              {/* AR Pills */}
              <div className="absolute top-1/4 left-1/3 bg-[#70a996] text-white text-[10px] px-2.5 py-1 rounded-full flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 bg-white rounded-full"></div> Breadboard
              </div>
              <div className="absolute top-1/2 right-6 bg-[#70a996] text-white text-[10px] px-2.5 py-1 rounded-full flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 bg-white rounded-full"></div> Arduino Nano
              </div>
              <div className="absolute bottom-1/3 left-6 bg-[#70a996] text-white text-[10px] px-2.5 py-1 rounded-full flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 bg-white rounded-full"></div> LED x5
              </div>
              <div className="absolute bottom-1/4 right-1/4 bg-[#70a996] text-white text-[10px] px-2.5 py-1 rounded-full flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 bg-white rounded-full"></div> 220Ω Resistor
              </div>
            </div>

            {/* Bottom Controls */}
            <div className="px-6 flex items-center justify-between mb-8">
              <button className="w-12 h-12 bg-[#1e2229] rounded-full flex items-center justify-center text-slate-300">
                <IconFlashlight size={20} />
              </button>
              <button className="px-8 py-3.5 bg-[#2a2d35] rounded-full text-sm font-medium">
                Re-scan
              </button>
              <button className="w-12 h-12 bg-[#1e2229] rounded-full flex items-center justify-center text-slate-300">
                <IconGrid size={20} />
              </button>
            </div>

            <div className="px-6 mb-8">
              <button onClick={() => setCurrentScreen(3)} className="w-full py-4 rounded-xl font-semibold text-slate-900" style={{ backgroundColor: theme.coral }}>
                Confirm
              </button>
            </div>
          </div>
        </AppContainer>
      );

      // Screen 3: Feasible Plans
      const ScreenPlans = () => (
        <AppContainer bg="#ffffff">
          <div className="flex-1 flex flex-col">
            {/* Header */}
            <div className="flex items-center justify-between px-4 py-2">
              <button onClick={() => setCurrentScreen(2)} className="p-2 text-slate-800"><IconChevronLeft size={24} /></button>
              <span className="font-semibold text-sm text-slate-800">Feasible Plans</span>
              <button className="p-2 text-slate-400"><IconHelpCircle size={20} /></button>
            </div>

            <div className="px-6 mt-4">
              <p className="text-sm text-slate-600 mb-6">Based on your scanned materials and settings.</p>

              <div className="space-y-4">
                {/* Plan A - Recommended */}
                <div className="p-4 border border-teal-100 rounded-2xl bg-white shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] cursor-pointer hover:border-teal-300 transition-colors" onClick={() => setCurrentScreen(4)}>
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <span className="px-2 py-0.5 bg-[#e4f6ef] text-[#476e62] text-[9px] font-bold rounded-sm uppercase tracking-wider">Recommended</span>
                      <h3 className="font-semibold text-slate-800 mt-1">Plan A (Fastest)</h3>
                    </div>
                    <span className="text-[#476e62] font-semibold text-sm">10-12m</span>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed mt-1">Arduino blink + single LED setup. Direct and efficient.</p>
                </div>

                {/* Plan B - Unavailable */}
                <div className="p-4 bg-[#f8fafc] border border-slate-100 rounded-2xl opacity-75">
                  <div className="mb-2">
                    <span className="px-2 py-0.5 bg-slate-200 text-slate-400 text-[9px] font-bold rounded-sm uppercase tracking-wider">Unavailable</span>
                    <h3 className="font-semibold text-slate-400 mt-1">Plan B (Double LED)</h3>
                  </div>
                  <div className="flex items-center gap-1.5 mt-2">
                    <IconAlertTriangle size={12} color="#d9a08e" />
                    <p className="text-[11px] font-medium text-[#d9a08e]">Missing required part: extra resistor</p>
                  </div>
                </div>

                {/* Plan C */}
                <div className="p-4 border border-slate-100 rounded-2xl bg-white shadow-sm cursor-pointer hover:border-slate-300 transition-colors">
                  <div className="flex justify-between items-start mb-2">
                    <h3 className="font-semibold text-slate-800">Plan C (Most Elaborative)</h3>
                    <span className="text-slate-400 font-semibold text-sm">25m</span>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed mt-1">Includes decorative blinking patterns and power-save mode.</p>
                </div>
              </div>
            </div>

            <div className="mt-auto px-6 mb-8">
              <button onClick={() => setCurrentScreen(4)} className="w-full py-4 rounded-xl text-white font-medium shadow-md" style={{ backgroundColor: theme.darkTeal }}>
                Start Plan A
              </button>
            </div>
          </div>
        </AppContainer>
      );

      // Screen 4: AR Tracking Coach
      const ScreenTracking = () => (
        <AppContainer bg={theme.coachBg}>
          <div className="flex-1 flex flex-col relative h-full">
            {/* Tracking Header Status */}
            <div className="px-4 py-3 bg-[#1e2229]/80 backdrop-blur-md rounded-xl mx-2 mt-2">
               <div className="flex items-center gap-2 mb-3">
                  <div className="w-1.5 h-1.5 bg-[#4ade80] rounded-full animate-pulse"></div>
                  <span className="text-[10px] font-bold text-white tracking-widest">TRACKING ON</span>
               </div>
               
               {/* Step Progress Bar */}
               <div className="flex gap-1 mb-1">
                  <div className="h-1 flex-1 rounded-full bg-[#70a996]"></div>
                  <div className="h-1 flex-1 rounded-full bg-slate-600"></div>
                  <div className="h-1 flex-1 rounded-full bg-slate-600"></div>
                  <div className="h-1 flex-1 rounded-full bg-slate-600"></div>
               </div>
               <div className="flex justify-between text-[7px] text-slate-300 font-semibold uppercase">
                  <span>Place LED</span>
                  <span>Wire Resistor</span>
                  <span>Connect Nano</span>
                  <span>Test</span>
               </div>
            </div>

            {/* Bottom Instruction Modal */}
            <div className="mt-auto bg-[#fafafa] rounded-t-3xl rounded-b-[32px] p-5 shadow-2xl pb-8 mx-2 mb-2 relative">
              <button onClick={() => setCurrentScreen(3)} className="absolute top-4 right-4 text-red-500 hover:bg-red-50 p-1 rounded-full transition-colors">
                <IconX size={18} />
              </button>

              <div className="flex justify-between items-start mt-2">
                <div className="flex-1 pr-4">
                  <span className="text-[9px] font-bold text-[#476e62] tracking-wider uppercase">Step 1 of 4</span>
                  <h2 className="text-[20px] font-bold text-slate-900 leading-tight mt-1 mb-1">Place the LED on the breadboard</h2>
                  <p className="text-[13px] text-slate-500 italic">Insert across the center gap.</p>
                </div>
                {/* Visual Icon Box */}
                <div className="w-16 h-16 bg-white border border-slate-200 rounded-xl shadow-sm flex items-center justify-center text-3xl shrink-0">
                   💡
                </div>
              </div>

              {/* Secondary Action Row */}
              <div className="grid grid-cols-3 gap-3 mt-6 mb-6">
                <button className="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors">
                  <IconRotateCcw size={18} />
                  <span className="text-[9px] font-medium mt-1.5">Repeat</span>
                </button>
                <button className="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors">
                  <IconZoomIn size={18} />
                  <span className="text-[9px] font-medium mt-1.5">Zoom</span>
                </button>
                <button className="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-slate-100 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors">
                  <IconBriefcase size={18} />
                  <span className="text-[9px] font-medium mt-1.5">Ref Wiring</span>
                </button>
              </div>

              {/* Primary Action Row */}
              <div className="flex gap-3">
                <button className="flex-1 py-4 bg-[#111418] text-white rounded-2xl font-medium text-sm hover:bg-slate-800 transition-colors shadow-lg">
                  Next
                </button>
                <button className="px-5 bg-white border border-slate-200 text-slate-800 rounded-2xl shadow-sm flex items-center justify-center hover:bg-slate-50 transition-colors">
                  <IconPause size={18} fill="currentColor" />
                </button>
              </div>
            </div>
          </div>
        </AppContainer>
      );

      // Simple screen router
      switch(currentScreen) {
        case 1: return <ScreenHome />;
        case 2: return <ScreenScanning />;
        case 3: return <ScreenPlans />;
        case 4: return <ScreenTracking />;
        default: return <ScreenHome />;
      }
    }

    // Render the React application to the DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ARBuilderCoach />);
  </script>
</body>
</html>
